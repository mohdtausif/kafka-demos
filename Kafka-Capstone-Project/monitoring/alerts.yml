# Alert rules for Kafka monitoring

groups:
  - name: kafka-alerts
    interval: 10s
    rules:
      # High consumer lag alert
      - alert: HighConsumerLag
        expr: 'kafka_consumergroup_lag > 10000'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High consumer lag detected"
          description: "Consumer group {{ $labels.consumergroup }} has lag of {{ $value }}"

      # Broker down alert
      - alert: BrokerDown
        expr: 'up{job="kafka-broker-1"} == 0 or up{job="kafka-broker-2"} == 0 or up{job="kafka-broker-3"} == 0'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kafka broker is down"
          description: "Broker {{ $labels.instance }} is not responding"

      # High disk usage
      - alert: HighDiskUsage
        expr: 'node_filesystem_avail_bytes / node_filesystem_size_bytes < 0.1'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage on {{ $labels.device }}"
          description: "Disk usage is above 90%"

      # Replication lag
      - alert: ReplicationLagHigh
        expr: 'kafka_server_replicafetcher_max_lag{clientId="Replica"} > 1000'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Replication lag is high"
          description: "Replication lag for partition {{ $labels.partition }} is {{ $value }} messages"
