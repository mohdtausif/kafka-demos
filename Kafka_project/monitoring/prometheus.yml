global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - '/etc/prometheus/alert-rules.yml'

scrape_configs:
  # Kafka Broker Metrics (JMX Exporter)
  - job_name: 'kafka-broker-1'
    static_configs:
      - targets: ['kafka-1:7071']
        labels:
          broker: 'kafka-1'

  - job_name: 'kafka-broker-2'
    static_configs:
      - targets: ['kafka-2:7071']
        labels:
          broker: 'kafka-2'

  - job_name: 'kafka-broker-3'
    static_configs:
      - targets: ['kafka-3:7071']
        labels:
          broker: 'kafka-3'

  # Spring Boot Actuator Endpoints
  - job_name: 'order-producer'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: 'analytics-consumer'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8082']

  - job_name: 'notification-consumer'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8084']

  - job_name: 'inventory-consumer'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8086']

  - job_name: 'kafka-streams-analytics'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8088']
